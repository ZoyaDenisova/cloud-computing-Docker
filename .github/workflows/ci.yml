name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "*"

permissions:
  contents: read

env:
  GO_VERSION: "1.22"

jobs:
  go_checks:
    name: go_checks (${{ matrix.service_dir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service_dir:
          - api-service/src
          - data-service/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        working-directory: ${{ matrix.service_dir }}
        run: |
          go mod download
          go build ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          working-directory: ${{ matrix.service_dir }}
          args: --config ../../.golangci.yml ./...

      - name: Test
        working-directory: ${{ matrix.service_dir }}
        run: |
          go test ./...

  docker_build:
    name: docker_build
    runs-on: ubuntu-latest
    needs: go_checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build
